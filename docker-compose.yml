name: cycling_smart_platform

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: cycling_db
    environment:
      POSTGRES_DB: cycling_smart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cycling_backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cycling_smart
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - JWT_SECRET=cycling_smart_jwt_secret_2024
      - JWT_EXPIRES_IN=7d
      - PORT=3002
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - GAODE_MAP_KEY=78f76df56116353033cf67bbfe95845c
    ports:
      - "3002:3002"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cycling_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local